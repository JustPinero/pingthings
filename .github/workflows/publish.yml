name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trust: no NPM_TOKEN required. npm verifies the workflow identity
    # against the "Trusted Publisher" config on npmjs.com for this package.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Node 22 ships with npm 10.x, but Trusted Publisher token exchange
      # for the registry write requires npm 11.5.1+. Without this step the
      # publish silently fails with `404 PUT /<pkg>` even though OIDC is
      # otherwise wired up correctly (provenance signing succeeds, but the
      # actual write is rejected). See npm changelog for v11.5.1.
      - name: Upgrade npm to support OIDC trusted publisher
        run: npm install -g npm@latest

      - name: Run tests
        run: npm test

      - name: Verify CLI
        run: |
          node bin/pingthings.js --version
          node bin/pingthings.js list
          node bin/pingthings.js --help

      # npm 11.5.1+ auto-detects OIDC env vars and uses them for auth.
      # --provenance attaches a signed attestation linking the publish to
      # this exact workflow run (visible on the npm package page).
      - name: Publish to npm
        run: npm publish --provenance
