name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trust: no NPM_TOKEN required. npm verifies the workflow identity
    # against the "Trusted Publisher" config on npmjs.com for this package.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Node 24 ships with npm 11.x. The Trusted Publisher token exchange
      # that authorizes the registry write requires npm 11.5.1+; with
      # Node 22's bundled npm 10, provenance signing succeeds but the
      # actual `PUT /<pkg>` registry write returns 404. Self-upgrading
      # npm in-place (`npm i -g npm@latest`) collides with the running
      # npm process and breaks transitive module loading, so we just use
      # a Node version that ships with the right npm.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Show npm version
        run: npm --version

      - name: Run tests
        run: npm test

      - name: Verify CLI
        run: |
          node bin/pingthings.js --version
          node bin/pingthings.js list
          node bin/pingthings.js --help

      # npm 11.5.1+ auto-detects OIDC env vars and uses them for auth.
      # --provenance attaches a signed attestation linking the publish to
      # this exact workflow run (visible on the npm package page).
      - name: Publish to npm
        run: npm publish --provenance
